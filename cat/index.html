<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Keyboard Cats & Dogs</title>
  <script src="js/paths.js"></script>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <div id="room" class="room">
    <img id="bg-a" class="room-bg visible" alt="" draggable="false" />
    <img id="bg-b" class="room-bg" alt="" draggable="false" />
    <div class="room-overlay" aria-hidden="true"></div>

    <div id="pets-stage" class="pets-stage">
      <div id="pets-row" class="pets-row"></div>
      <div id="prints" class="prints"></div>
    </div>

    <div id="hint" class="hint">
      <p>Press any key — cats &amp; dogs react! Space = surprise!</p>
      <p class="hint-sub">Tap the screen once if you don’t hear sounds</p>
    </div>
  </div>

  <script src="js/audio.js?v=3"></script>
  <script src="js/background.js?v=3"></script>
  <script src="js/cat.js?v=3"></script>
</body>
</html>
